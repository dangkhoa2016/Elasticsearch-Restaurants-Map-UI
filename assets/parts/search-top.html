<div id='container'>
  <div class='row'>
    <div id='nav' class='offset-1 col-10 offset-sm-2 offset-md-3 offset-lg-4 col-sm-8 col-md-6 col-lg-4 py-3 rounded'
      role='search' aria-label='Restaurant search'>
      <label for='txt-address' class='visually-hidden'>Enter your address</label>
      <div class='d-flex gap-1 mb-2'>
        <input type='text' class='form-control form-control-sm' id='txt-address' aria-describedby='address' placeholder='Enter your address' />
        <button type='button' id='btn-my-location' class='btn btn-sm btn-outline-secondary flex-shrink-0'
          aria-label='Use my current location' title='Use my current location'>
          <i class='bi-geo-alt-fill' aria-hidden='true'></i>
        </button>
      </div>
      <div class='d-flex justify-content-between'>
        <button class='btn btn-sm btn-secondary' type='button' data-bs-toggle='offcanvas' data-bs-target='#advanced-panel'
          aria-controls='advanced-panel' aria-label='Open advanced search options'>Advanced</button>
        <a id='toggle-panel' href='javascript:void(0);' class='text-black'
          role='button' aria-label='Toggle search panel' aria-expanded='true'>
          <i class='bi-arrow-up-circle-fill' style='font-size: 1.4rem;' aria-hidden='true'></i>
        </a>
        <div>
          <button type='button' id='btn-clear' class='btn btn-sm btn-warning me-1'>Clear</button>
          <button type='button' id='btn-share' class='btn btn-sm btn-outline-secondary me-1'
            aria-label='Copy shareable link to clipboard' title='Share search link'>
            <i class='bi-share-fill' aria-hidden='true'></i>
          </button>
          <button type='button' id='btn-list-view' class='btn btn-sm btn-outline-secondary me-1'
            data-bs-toggle='offcanvas' data-bs-target='#list-view-panel'
            aria-controls='list-view-panel' aria-label='Show results as list'>
            <i class='bi-list-ul' aria-hidden='true'></i>
          </button>
          <button type='button' id='btn-search' class='btn btn-sm btn-primary'>Search</button>
        </div>
      </div>
      <div id='search-history' class='mt-2 pt-2 border-top' style='display:none'>
        <div class='d-flex justify-content-between align-items-center mb-1'>
          <small class='text-muted'><i class='bi-clock-history me-1' aria-hidden='true'></i>Recent</small>
          <button type='button' id='btn-clear-history' class='btn btn-link btn-sm p-0 text-danger' style='font-size:0.75rem'>Clear</button>
        </div>
        <div id='history-list'></div>
      </div>
    </div>
  </div>

  <div id='map' role='application' aria-label='Restaurant map'></div>
</div>
